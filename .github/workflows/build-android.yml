name: Build Android

# Manually triggered. Builds the Flutter Android APK (debug + release)
# after rebuilding the gomobile AAR. Does NOT auto-run on push.
#
# google-services.json: the OSS source ships a stub that lets the build
# succeed without Firebase. To produce a Firebase-functional APK, set
# the GOOGLE_SERVICES_JSON repo secret to the base64-encoded contents of
# your real google-services.json. Same for FIREBASE_OPTIONS_DART. Both
# are optional — leave unset to ship a PSK-only build.
#
# Release-signing is intentionally not wired here yet; the release APK
# is signed with the debug keystore so you can install it via adb but
# not upload to Play Store. Real signing (Play upload key) is a
# separate workflow when distribution starts.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (debug | release)'
        required: false
        default: 'debug'
        type: choice
        options: ['debug', 'release']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 ndk;26.1.10909125'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Restore Firebase config (optional)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
          APP_FIREBASE_JSON: ${{ secrets.APP_FIREBASE_JSON }}
        run: |
          if [[ -n "$GOOGLE_SERVICES_JSON" ]]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/android/app/google-services.json
          fi
          if [[ -n "$FIREBASE_OPTIONS_DART" ]]; then
            echo "$FIREBASE_OPTIONS_DART" | base64 -d > app/lib/firebase_options.dart
          fi
          if [[ -n "$APP_FIREBASE_JSON" ]]; then
            echo "$APP_FIREBASE_JSON" | base64 -d > app/firebase.json
          fi

      - name: Initialise gomobile
        run: gomobile init

      - name: Build mobile-core AAR
        run: bash scripts/build-mobile-core.sh android

      - name: Resolve Flutter packages
        working-directory: app
        run: flutter pub get

      - name: flutter analyze
        working-directory: app
        run: flutter analyze

      - name: flutter build apk (${{ inputs.profile }})
        working-directory: app
        run: flutter build apk --${{ inputs.profile }}

      - name: Upload APK artefact
        uses: actions/upload-artifact@v4
        with:
          name: peersh-android-${{ inputs.profile }}
          path: app/build/app/outputs/flutter-apk/app-${{ inputs.profile }}.apk
          retention-days: 14
