# Render.com Blueprint for peersh-signaling.
#
# How to use:
#   1. Push the repo to GitHub.
#   2. In Render: New → Blueprint → connect the repo. Render reads this
#      file and creates the Web Service.
#   3. After the first deploy you'll have a hostname like
#      peersh-signaling-xxxx.onrender.com. Set the env var
#      PEERSH_SIGNALING_DISCOVERY_WS_URL to
#      wss://peersh-signaling-xxxx.onrender.com/ws so the
#      /.well-known/peersh.json endpoint returns the right URL.
#   4. SSH-equivalent: open the Render Shell, run
#      `peersh-signaling psk add --user <name>` to create a PSK.
#
# Notes:
#   - Render injects $PORT; the Dockerfile honours it (no need to set
#     PEERSH_SIGNALING_LISTEN explicitly).
#   - Render provides automatic HTTPS at the *.onrender.com edge. The
#     container speaks plain HTTP behind that edge (Dockerfile passes
#     -insecure-http).
#   - The Starter plan ($7/mo) is required for the persistent disk that
#     keeps PSKs across restarts. The Free plan also works for smoke
#     tests, but PSKs reset on every redeploy and the service spins down
#     after 15 minutes of inactivity.

services:
  - type: web
    name: peersh-signaling
    runtime: docker
    region: oregon
    plan: starter
    autoDeploy: true
    dockerfilePath: ./server/deploy/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    disk:
      name: peersh-signaling-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PEERSH_SIGNALING_LOG_LEVEL
        value: info
      # Filled in by the operator after the first deploy. Until set,
      # /.well-known/peersh.json returns ws_url = "" and the mobile app
      # falls back to whatever URL the user typed in.
      - key: PEERSH_SIGNALING_DISCOVERY_WS_URL
        sync: false
