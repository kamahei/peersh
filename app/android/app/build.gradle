plugins {
    id "com.android.application"
    id "com.google.gms.google-services"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Optional release signing. Drop a `key.properties` next to this
// build.gradle (or in app/android/) with:
//
//   storeFile=...
//   storePassword=...
//   keyAlias=...
//   keyPassword=...
//
// to sign release APKs / app bundles with your own upload key. When
// the file is absent, release builds fall back to debug-keystore
// signing — fine for sideload, NOT acceptable for Play Store upload.
def keyPropertiesFile = rootProject.file("key.properties")
def hasReleaseKey = keyPropertiesFile.exists()
def keystoreProperties = new Properties()
if (hasReleaseKey) {
    keyPropertiesFile.withInputStream { keystoreProperties.load(it) }
}

android {
    namespace = "dev.peersh.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
        languageVersion = "2.1"
        apiVersion = "2.1"
    }

    defaultConfig {
        // The mobile-core (gomobile) AAR's minimum API target is 21,
        // but cloud_firestore (Phase 5b) requires API 23+. We bump the
        // floor to 23, which still covers Android 6.0+ (>99% of devices).
        applicationId = "dev.peersh.app"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        if (hasReleaseKey) {
            release {
                storeFile = file(keystoreProperties["storeFile"])
                storePassword = keystoreProperties["storePassword"]
                keyAlias = keystoreProperties["keyAlias"]
                keyPassword = keystoreProperties["keyPassword"]
            }
        }
    }

    buildTypes {
        release {
            // Use the operator's release key when key.properties is
            // present; otherwise fall back to the debug keystore so
            // `flutter build apk --release` still produces an
            // installable (sideload-only) APK out of the box.
            signingConfig = hasReleaseKey
                ? signingConfigs.release
                : signingConfigs.debug
            // Code-shrink stays off until we add a R8 keep-rules file
            // for the gomobile-generated classes; turning it on without
            // rules currently strips peersh.Peersh / peersh.Session.
            minifyEnabled = false
            shrinkResources = false
        }
    }
}

// Pull in the mobile-core .aar produced by `scripts/build-mobile-core.sh`.
// The AAR is not committed; each developer / CI rebuilds it.
repositories {
    flatDir {
        dirs "libs"
    }
}

dependencies {
    implementation(name: "peersh", ext: "aar")
}

flutter {
    source = "../.."
}
