plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Phase 5b: the google-services plugin is opt-in. Applying it requires
// a google-services.json in app/ — for the default (PSK) build that
// file is absent, and we do not want to bake operator-specific Firebase
// config into the OSS source tree. Setting the PEERSH_FIREBASE env var
// to "true" before `flutter build` applies the plugin; without it the
// build skips Firebase wiring entirely.
def peershFirebaseEnabled = System.getenv('PEERSH_FIREBASE') == 'true'
if (peershFirebaseEnabled) {
    apply plugin: 'com.google.gms.google-services'
}

android {
    namespace = "dev.peersh.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // The mobile-core (gomobile) AAR's minimum API target is 21,
        // but cloud_firestore (Phase 5b) requires API 23+. We bump the
        // floor to 23, which still covers Android 6.0+ (>99% of devices).
        applicationId = "dev.peersh.app"
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

// Pull in the mobile-core .aar produced by `scripts/build-mobile-core.sh`.
// The AAR is not committed; each developer / CI rebuilds it.
repositories {
    flatDir {
        dirs "libs"
    }
}

dependencies {
    implementation(name: "peersh", ext: "aar")
}

flutter {
    source = "../.."
}
