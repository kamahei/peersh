// Per-command (and per-PTY) bidi streams opened after the control stream's
// Hello handshake completes.
//
// Every fresh stream begins with a StreamRequest envelope so the server can
// dispatch between the one-shot Exec path (Phase 1) and the interactive PTY
// path (Phase 8). The two paths share the underlying QUIC transport but
// have distinct response shapes.
syntax = "proto3";

package peersh.v1;

// StreamRequest is the first frame on a fresh stream. The populated `kind`
// determines how the server treats subsequent frames on the stream.
message StreamRequest {
  oneof kind {
    ExecRequest  exec  = 1;
    PTYRequest   pty   = 2;
    FilesRequest files = 3;
  }
}

// --- Exec (one-shot) -------------------------------------------------------

// ExecRequest runs a single command and streams its output back. Used by
// peersh-cli's prompt loop and the mobile app's text viewer (ReadFile is
// implemented as Exec under the hood).
message ExecRequest {
  // command is the PowerShell expression to execute. Treated as a single
  // pipeline; the host appends a sentinel marker to detect completion.
  string command = 1;

  // working_dir, if non-empty, is set as the current working directory for
  // this command only. Empty means "use the session's current directory".
  // Reserved in Phase 1; implemented by the cwd-aware ReadFile path in
  // Phase 8 Tier 2.
  string working_dir = 2;
}

// ExecResponse carries either a chunk of output or the end-of-command signal.
// One ExecRequest produces a stream of ExecResponse messages, with the final
// message having done = true.
message ExecResponse {
  // chunk holds streamed output bytes. Exactly one of stdout / stderr is set
  // on any non-final message; both may be unset on the final done = true
  // message.
  oneof chunk {
    bytes stdout = 1;
    bytes stderr = 2;
  }

  // done signals end-of-command. The stream is closed after this message.
  bool done = 3;
}

// --- PTY (interactive) -----------------------------------------------------

// PTYRequest opens a pseudo-console-backed shell or program on the host.
// After the server acks (by starting to send PTYData frames), the client
// streams keystrokes as PTYInput frames and resize notifications as
// PTYResize frames; the server streams PTYData frames carrying raw output
// (ANSI sequences and all) and finally a single PTYExit terminator.
message PTYRequest {
  // command, when non-empty, is the executable to spawn (e.g. "claude").
  // Empty means "use the operator-configured default shell" — usually
  // pwsh wrapped with the OSC 9;9 prompt instrumentation.
  string command = 1;

  // args are the command-line arguments passed verbatim. Ignored when
  // command is empty (the server picks the default shell wrapper).
  repeated string args = 2;

  // cols and rows are the initial terminal grid the client wants the
  // pseudo-console sized to.
  uint32 cols = 3;
  uint32 rows = 4;

  // env carries supplementary environment variables (e.g. TERM=xterm-256color).
  // The host process inherits the peershd environment plus these overrides.
  map<string, string> env = 5;

  // pty_id is a client-chosen handle that becomes the lookup key for
  // the file-API requests (FilesRequest.{Get,List,Read}*). Must be
  // unique within this QUIC connection. Tier 2 — clients that don't
  // care about the file API may leave it 0; the file API will refuse
  // to resolve pty_id=0.
  int64 pty_id = 6;

  // reattach_handle, when non-empty, requests reattaching to a
  // previously-opened persisted PTY identified by this server-assigned
  // handle. command / args / env are ignored for reattach (the
  // existing child keeps running); cols / rows are honoured (they
  // resize the existing PTY). The server replies with a
  // PTYReattachAck frame as the first server-bound frame, followed by
  // the scrollback replay as PTYData chunks. Phase 6b Tier 2.
  string reattach_handle = 7;
}

// PTYReattachAck is the first server-bound frame on a reattach stream.
// It tells the client whether the requested handle was attached (and
// the new server-assigned handle, in case the client needs to refresh
// its stored copy). After ack, the server flushes the scrollback ring
// buffer as zero or more PTYData frames in chronological order, then
// resumes live PTY data flow.
message PTYReattachAck {
  // handle is the server-assigned reattach handle. For a fresh PTY
  // that just got persisted, this is the newly-issued handle. For a
  // successful reattach this echoes the request's reattach_handle.
  string handle = 1;
  // accepted is false when the requested handle was unknown / expired
  // / already attached by another client; the rest of the stream
  // carries a final PTYExit and closes.
  bool accepted = 2;
  // reason is human-readable text when accepted=false.
  string reason = 3;
}

// PTYInput delivers a chunk of bytes from the user's keyboard / paste
// buffer to the child process's stdin.
message PTYInput {
  bytes data = 1;
}

// PTYResize tells the child the terminal grid dimensions changed.
// Programs that re-flow on SIGWINCH (or its Windows equivalent) react.
message PTYResize {
  uint32 cols = 1;
  uint32 rows = 2;
}

// PTYData carries raw output bytes from the child's pseudo-console.
// ConPTY merges stdout/stderr into a single byte stream, so unlike
// ExecResponse there is no separate channel tagging.
message PTYData {
  bytes data = 1;
}

// PTYExit terminates the PTY stream. After PTYExit the server closes the
// stream and any further client frames are discarded.
message PTYExit {
  // exit_code mirrors the child process's exit status. -1 indicates an
  // unknown / abnormal exit (e.g. peersh killed the process to satisfy
  // an idle timeout).
  int32 exit_code = 1;

  // error, when non-empty, describes a server-side failure (spawn error,
  // pseudo-console allocation failure, ...).
  string error = 2;
}

// PTYFrame multiplexes the direction-specific message types onto the
// single QUIC stream. Client → server frames use the input / resize /
// notification_config fields; server → client frames use the data /
// exit / reattach_ack fields.
message PTYFrame {
  oneof kind {
    PTYInput              input               = 1;
    PTYResize             resize              = 2;
    PTYData               data                = 3;
    PTYExit               exit                = 4;
    PTYReattachAck        reattach_ack        = 5;
    PTYNotificationConfig notification_config = 6;
  }
}

// PTYNotificationConfig (client → server) toggles per-PTY push-
// notification behavior on the host. v2-B uses this to opt the
// individual terminal tab into command-completion alerts.
message PTYNotificationConfig {
  // enabled gates all notifications from this PTY. When false, the
  // host does not write any RTDB notification doc regardless of
  // OSC 9;9 detection or idle silence.
  bool enabled = 1;

  // threshold_seconds is the minimum elapsed time between a user-
  // typed command starting and the next prompt OSC 9;9 firing
  // before a notification is dispatched. Default 10 s; commands
  // shorter than this don't notify.
  uint32 threshold_seconds = 2;

  // idle_seconds enables the output-silence heuristic for non-shell
  // tools (Claude / Codex / etc.) that don't emit OSC 9;9 prompt
  // markers. When the PTY's stdout has been silent for this many
  // seconds AND a command is still considered running, the host
  // dispatches a single notification. 0 disables the heuristic
  // entirely.
  uint32 idle_seconds = 3;

  // tab_label is the human-readable label the mobile client uses
  // for this PTY tab. The host echoes it into the notification body
  // so the user sees which tab finished.
  string tab_label = 4;

  // mobile_device_id is the UUID the mobile app generated and
  // registered against RTDB at users/{uid}/devices/{mobile_device_id}/
  // fcm_token. The host writes this into the RTDB notification doc;
  // the Cloud Function uses it to look up the FCM token to dispatch
  // to. Must be present for notifications to fire.
  string mobile_device_id = 5;
}

// --- Session-scoped file API (Phase 8 Tier 2) ----------------------------
//
// Path resolution rule: every request supplies a `pty_id` that names a
// live PTY session on the host. The host's CWDTracker has been observing
// the shell's prompt OSC 9;9 emissions and holds the latest cwd. The
// supplied `path` is interpreted relative to that cwd (empty path means
// the cwd itself). The server rejects paths that escape the cwd (".." or
// absolute paths) so a malicious client cannot read /etc/passwd / SAM
// hives by spamming GetFile.
//
// pty_id is the same opaque integer that PTYRequest produced — peershd
// keeps a per-stream-id map. If the PTY has been torn down, the file
// request fails with PTY_NOT_FOUND.

message FilesRequest {
  oneof kind {
    GetSessionRequest      get_session       = 1;
    ListSessionFilesRequest list_files        = 2;
    ReadSessionFileRequest  read_file         = 3;
    ListPTYsRequest         list_ptys         = 4;
    KillPTYRequest          kill_pty          = 5;
  }
}

message FilesResponse {
  // error, when non-empty, indicates the request failed and the other
  // payload fields are unset.
  string error = 1;
  oneof payload {
    GetSessionResponse      get_session  = 2;
    ListSessionFilesResponse list_files  = 3;
    ReadSessionFileResponse  read_file   = 4;
    ListPTYsResponse         list_ptys   = 5;
    KillPTYResponse          kill_pty    = 6;
  }
}

// KillPTYRequest tears down a persisted PTY by its reattach handle.
// Unlike a stream close (which detaches but keeps the PTY alive for
// the idle TTL), KillPTY closes the underlying child process and
// drops the ring buffer immediately. Phase 6b Tier 2.
message KillPTYRequest {
  string handle = 1;
}

message KillPTYResponse {
  bool ok = 1;
}

// ListPTYsRequest enumerates persisted PTYs the connected client may
// reattach to. There are no parameters today — peersh's per-connection
// Manager scope means the response naturally only includes this
// client's own PTYs. Phase 6b Tier 2.
message ListPTYsRequest {}

message PTYHandle {
  // handle is the server-assigned reattach handle.
  string handle = 1;
  // command is what the PTY is running (diagnostic; "auto" / "pwsh" /
  // "claude" / ...). May be empty for default shells.
  string command = 2;
  // attached is true when another stream is currently bound. A client
  // that wants to take over should explicitly close the old session
  // first; reattaching to an already-attached PTY is rejected.
  bool attached = 3;
  // cwd is the most recent directory the host observed (via OSC 9;9).
  // Empty until the prompt has rendered at least once.
  string cwd = 4;
  // last_seen_unix_ms is the wall-clock time of the most recent
  // attach/detach transition.
  int64 last_seen_unix_ms = 5;
}

message ListPTYsResponse {
  repeated PTYHandle ptys = 1;
}

message GetSessionRequest {
  // pty_id identifies the live PTY whose cwd to report.
  int64 pty_id = 1;
}

message GetSessionResponse {
  // cwd is the last directory observed in the shell's prompt OSC 9;9
  // sequence. Empty until the prompt has rendered at least once.
  string cwd = 1;
}

message ListSessionFilesRequest {
  int64  pty_id = 1;
  // path is resolved against the session's cwd. Empty means cwd itself.
  // Forward slashes and back slashes are both accepted.
  string path = 2;
}

message FileEntry {
  string name      = 1;
  // path is the cwd-relative path of this entry, suitable for passing
  // back as ListSessionFilesRequest.path or ReadSessionFileRequest.path.
  string path      = 2;
  bool   is_dir    = 3;
  int64  size      = 4;
  // modified_unix_ms is the file's modification time in unix milliseconds.
  int64  modified_unix_ms = 5;
}

message ListSessionFilesResponse {
  // resolved_path is the canonicalised cwd-relative path the host
  // actually listed (after collapsing redundant separators).
  string resolved_path = 1;
  repeated FileEntry entries = 2;
}

message ReadSessionFileRequest {
  int64  pty_id = 1;
  string path   = 2;
  // max_bytes caps the response size. 0 -> server default (4 MiB).
  int64  max_bytes = 3;
}

message ReadSessionFileResponse {
  bytes  content       = 1;
  string encoding      = 2;       // "utf-8", "utf-8-bom", "utf-16-le", ...
  int64  size          = 3;       // total file size on disk
  bool   truncated     = 4;       // content was clipped to max_bytes
}
